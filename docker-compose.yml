services:
  db:
    image: mariadb
    volumes:
      - ./BDD_constructor.sql:/docker-entrypoint-initdb.d/db.sql
    environment:
      # MARIADB_USER: root
      MARIADB_DATABASE: auction_site
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "${DB_PORT}:3306"

  php:
    build:
      context: ./
    ports:
      - 80:80
    env_file:
      - .env
    volumes:
      - ./newMVC:/var/www/html

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    ports:
      - 7700:7700
